<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Study Assistant</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 20px;
            margin: 15px 0;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        a {
            text-decoration: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            display: block;
        }

        .subtitle {
            opacity: 0.7;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>AI Study Assistant</h1>
    <p class="subtitle">Choose a tool to get started</p>

    <div class="card">
        <a href="/summarize/">📄 Summarizer</a>
    </div>

    <div class="card">
        <a href="/quiz/">🧠 Quiz Generator</a>
    </div>

</div>

</body>
</html>
