<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Completed</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card {
        width: 90%;
        max-width: 500px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 18px;
        padding: 35px;
        text-align: center;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
        font-size: 1.8rem;
        margin-bottom: 10px;
    }

    .score {
        font-size: 3rem;
        font-weight: 700;
        margin: 20px 0;
        color: #60a5fa;
    }

    p {
        opacity: 0.8;
        margin-bottom: 10px;
    }

    .buttons {
        display: flex;
        gap: 12px;
        margin-top: 25px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .btn {
        text-decoration: none;
        padding: 12px 18px;
        border-radius: 12px;
        font-weight: 600;
        transition: 0.3s ease;
        min-width: 140px;
        text-align: center;
    }

    .retry {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: white;
    }

    .retry:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, #16a34a, #15803d);
    }

    .exit {
        background: rgba(239, 68, 68, 0.9);
        color: white;
    }

    .exit:hover {
        transform: translateY(-2px);
        background: #ef4444;
    }

    .emoji {
        font-size: 2rem;
    }
</style>
</head>

<body>

<div class="card">

    <div class="emoji">🎉</div>
    <h2>Quiz Completed</h2>

    <p>You scored:</p>

    <div class="score">
        {{ score }} / {{ total }}
    </div>

    <p>Great effort! Keep improving 🚀</p>

    <div class="buttons">
        <a href="/quiz/" class="btn retry">🔄 Try Again</a>
        <a href="/" class="btn exit">🚪 Exit</a>
    </div>

</div>

</body>
</html>
