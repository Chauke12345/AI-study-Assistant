<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Summarizer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
    }

    .container {
        width: 100%;
        max-width: 750px;
    }

    .card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 18px;
        padding: 30px;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
        font-size: 1.8rem;
        margin-bottom: 10px;
    }

    .subtitle {
        opacity: 0.7;
        margin-bottom: 20px;
    }

    textarea {
        width: 100%;
        height: 220px;
        padding: 15px;
        border-radius: 12px;
        border: none;
        outline: none;
        resize: none;
        font-size: 1rem;
        font-family: 'Inter', sans-serif;
        background: rgba(255,255,255,0.1);
        color: white;
    }

    textarea::placeholder {
        color: rgba(255,255,255,0.5);
    }

    button {
        margin-top: 15px;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #6366f1, #3b82f6);
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
    }

    button:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, #4f46e5, #2563eb);
    }

    .result {
        margin-top: 25px;
        padding: 20px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .result h3 {
        margin-top: 0;
        color: #60a5fa;
    }

    .result p {
        line-height: 1.6;
        opacity: 0.9;
    }

    /* 🔙 navigation buttons */
    .nav-buttons {
        display: flex;
        gap: 12px;
        margin-top: 20px;
        flex-wrap: wrap;
    }

    .nav-btn {
        flex: 1;
        text-align: center;
        padding: 12px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s ease;
    }

    .back {
        background: rgba(255,255,255,0.15);
        color: white;
    }

    .back:hover {
        background: rgba(255,255,255,0.25);
    }

    .exit {
        background: #ef4444;
        color: white;
    }

    .exit:hover {
        background: #dc2626;
    }

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h2>📄 AI Summarizer</h2>
        <p class="subtitle">Paste text and get a clean AI-powered summary</p>

        <form method="POST">
            {% csrf_token %}
            <textarea name="text" placeholder="Paste your text here..."></textarea>

            <button type="submit">✨ Summarize</button>
        </form>

        {% if summary %}
        <div class="result">
            <h3>🧠 Summary</h3>
            <p>{{ summary }}</p>
        </div>
        {% endif %}

        <!-- 🔙 Navigation Buttons -->
        <div class="nav-buttons">
            <a href="/" class="nav-btn back">🔙 Back</a>
            <a href="/" class="nav-btn exit">🚪 Exit</a>
        </div>

    </div>

</div>

</body>
</html>
